# Audit criteria for the Business Case kind.
kind: business-case

required_sections:
  - Problem Statement
  - Options Considered
  - Recommendation
  - Costs
  - Benefits

checks:
  - id: frontmatter-schema
    type: structural
    blocking: true
    description: Frontmatter is valid against schema/business-case.schema.json.
  - id: frontmatter-complete
    type: structural
    blocking: once-proposed
    description: Every schema-required frontmatter field is present (advisory while draft).
  - id: required-sections
    type: structural
    blocking: once-proposed
    description: Every required section is present and non-empty.
  - id: unique-id
    type: structural
    blocking: true
    description: The document id is unique across documents/.
