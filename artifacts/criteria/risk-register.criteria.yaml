# Audit criteria for the Risk Register kind.
kind: risk-register

required_sections:
  - Overview
  - Risks

item_sections:
  - section: Risks
    prefix: RISK

checks:
  - id: frontmatter-schema
    type: structural
    blocking: true
    description: Frontmatter is valid against schema/risk-register.schema.json.
  - id: frontmatter-complete
    type: structural
    blocking: once-proposed
    description: Every schema-required frontmatter field is present (advisory while draft).
  - id: required-sections
    type: structural
    blocking: once-proposed
    description: Every required section is present and non-empty.
  - id: items-well-formed
    type: structural
    blocking: true
    description: Every risk is a valid **RISK-###** item.
  - id: risk-items-complete
    type: structural
    blocking: once-proposed
    description: Every risk states a Probability, Impact, Owner, and Response.
  - id: risk-disposition-valid
    type: structural
    blocking: true
    description: Any Status field on a RISK item names a valid disposition (open/mitigated/accepted/closed).

  - id: unique-id
    type: structural
    blocking: true
    description: The document id is unique across documents/.
