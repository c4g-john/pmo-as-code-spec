name: bridge scaffold (PRJ-003-STD)

# Documents -> issues for the one portfolio project mapped to this repo.
# The governing documents live in c4g-john/pmo-as-code-pmo; this repo's
# GITHUB_TOKEN can only write issues here, which is the point.
on:
  schedule:
    - cron: "27 */2 * * *"
  workflow_dispatch:

concurrency:
  group: bridge-scaffold
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: c4g-john/pmo-as-code-pmo
          path: pmo
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - uses: c4g-john/docassert-action/install@v1
        with:
          version-file: pmo/.docassert-version
      - name: Scaffold this repo's project
        env:
          GH_TOKEN: ${{ github.token }}
          PROJECTS_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          PROJECT_NUMBER: ${{ vars.BRIDGE_PROJECT_NUMBER }}
        run: |
          extra=""
          if [ -n "$PROJECT_NUMBER" ] && [ -n "$PROJECTS_TOKEN" ]; then
            extra="--project-owner c4g-john --project-number $PROJECT_NUMBER --init-board"
          fi
          # shellcheck disable=SC2086
          docassert bridge scaffold \
            --documents-dir pmo/documents \
            --project PRJ-003-STD \
            --repo "$GITHUB_REPOSITORY" \
            --docs-url "https://github.com/c4g-john/pmo-as-code-pmo/blob/main" \
            $extra
